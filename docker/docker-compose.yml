version: '3.9'

services:
  # ── MongoDB (local dev, mirrors Atlas) ─────────
  mongodb:
    image: mongo:7
    container_name: agentforge-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: agentforge
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Letta (MemGPT) ────────────────────────────
  letta:
    image: letta/letta:latest
    container_name: agentforge-letta
    ports:
      - "8283:8283"
    volumes:
      - letta-data:/root/.letta
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8283/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── n8n (v2 — tool execution) ─────────────────
  # n8n:
  #   image: n8nio/n8n:latest
  #   container_name: agentforge-n8n
  #   ports:
  #     - "5678:5678"
  #   volumes:
  #     - n8n-data:/home/node/.n8n
  #   environment:
  #     - N8N_BASIC_AUTH_ACTIVE=true
  #     - N8N_BASIC_AUTH_USER=${N8N_USER}
  #     - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}

volumes:
  mongo-data:
  letta-data:
