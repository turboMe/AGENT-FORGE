# ═══════════════════════════════════════════════════════
#  AgentForge — Deploy to Google Cloud Run
#  Runs on push to main
# ═══════════════════════════════════════════════════════

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGION: europe-north1
  SERVICE: agentforge-api
  REGISTRY: europe-north1-docker.pkg.dev

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to GCP ──────────────────────────
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      # ── Configure Docker for Artifact Registry ───────
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── Build & Push Docker image ────────────────────
      - name: Set image tag
        id: meta
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/agentforge/api
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag_sha=${IMAGE}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "tag_latest=${IMAGE}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.tag_sha }} \
            -t ${{ steps.meta.outputs.tag_latest }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.tag_sha }}
          docker push ${{ steps.meta.outputs.tag_latest }}

      # ── Deploy to Cloud Run ──────────────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ steps.meta.outputs.tag_sha }}
          region: ${{ env.REGION }}
          flags: |
            --port=3000
            --memory=512Mi
            --min-instances=0
            --max-instances=3
            --allow-unauthenticated

      # ── Verify deployment ────────────────────────────
      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "🚀 Deployed to: ${URL}"
          curl -sf "${URL}/api/v1/health/live" || echo "⚠️  Health check pending (service may need env vars configured)"
